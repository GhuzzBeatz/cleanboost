<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>CleanBoost — Ativação</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#161616;border:1px solid #8b0000;border-radius:18px;padding:40px 44px;max-width:460px;width:100%;box-shadow:0 0 60px rgba(204,0,0,.2);text-align:center}
.icon{font-size:52px;margin-bottom:14px}h1{font-size:22px;font-weight:900;margin-bottom:4px}.h1 span{color:#e60000}
.sub{font-size:13px;color:#555;margin-bottom:28px}
label{display:block;font-size:10px;font-weight:800;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;text-align:left}
input{width:100%;background:#111;border:2px solid #2a2a2a;border-radius:10px;padding:13px 16px;color:#f0f0f0;font-size:16px;font-family:monospace;text-transform:uppercase;letter-spacing:2px;text-align:center;outline:none;margin-bottom:14px;transition:border-color .2s}
input:focus{border-color:#cc0000}input.erro{border-color:#ff1a1a}
button{width:100%;padding:13px;background:linear-gradient(135deg,#8b0000,#cc0000);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;margin-bottom:10px;transition:all .15s}
button:hover{background:linear-gradient(135deg,#cc0000,#ff1a1a);box-shadow:0 4px 20px rgba(204,0,0,.5)}
.formato{font-size:11px;color:#3a3a3a;margin-bottom:18px}.formato span{font-family:monospace;color:#cc0000;background:rgba(204,0,0,.1);padding:2px 8px;border-radius:4px}
.msg-erro{background:rgba(204,0,0,.1);border:1px solid rgba(204,0,0,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#ff1a1a;display:none;margin-bottom:10px}
.msg-ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:#22c55e;display:none;margin-bottom:10px}
.suporte{font-size:11px;color:#3a3a3a;margin-top:14px;line-height:1.8}.suporte a{color:#cc0000;text-decoration:none}
</style></head><body>
<div class="card">
  <div class="icon"><img src="../logo.png" style="width:80px;height:80px;object-fit:contain;border-radius:16px"></div>
  <h1><span style="color:#e60000">Clean</span>Boost</h1>
  <div class="sub">Limpeza e Otimização de PC</div>
  <label>Chave de Ativação</label>
  <input type="text" id="inputChave" placeholder="CLEAN-0000-XXXX-0000" maxlength="20" oninput="fmt(this)">
  <div class="formato">Formato: <span>CLEAN-0000-XXXX-0000</span></div>
  <div class="msg-erro" id="msgErro">❌ Chave inválida. Verifique e tente novamente.</div>
  <div class="msg-ok"   id="msgOk">✅ Licença ativada! Iniciando...</div>
  <button onclick="ativar()">🔓 Ativar Licença</button>
  <div class="suporte">Suporte: <a href="mailto:GHZPLUGIN@GMAIL.COM">GHZPLUGIN@GMAIL.COM</a><br>WhatsApp: (11) 94898-1459</div>
</div>
<script src="../js/licenca.js"></script>
<script>
function fmt(el){let v=el.value.replace(/[^A-Z0-9]/gi,'').toUpperCase();if(v.startsWith('CLEAN')){let rest=v.slice(5),parts=['CLEAN'];for(let i=0;i<rest.length&&parts.length<4;i+=4)parts.push(rest.slice(i,i+4));el.value=parts.join('-')}else{el.value=v};el.classList.remove('erro');document.getElementById('msgErro').style.display='none'}
function ativar(){const k=document.getElementById('inputChave').value.trim().toUpperCase();if(validarChaveCB(k)){salvarLicencaCB(k);document.getElementById('msgOk').style.display='block';setTimeout(()=>window.location.replace('../index.html'),1500)}else{document.getElementById('inputChave').classList.add('erro');document.getElementById('msgErro').style.display='block'}}
document.getElementById('inputChave').addEventListener('keydown',e=>{if(e.key==='Enter')ativar()})
</script></body></html>
