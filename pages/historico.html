<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../css/style.css"><script src="../js/util.js"></script></head><body>
<div class="page-content">
  <div class="page-hdr-row page-header">
    <div><h1>📋 Histórico de <span>Limpezas</span></h1><p>Registro de todas as limpezas realizadas</p></div>
    <button class="btn btn-ghost" onclick="limpar()" style="color:var(--red3);border-color:var(--red-bdr)">🗑️ Limpar Histórico</button>
  </div>
  <div id="histBox"><div style="text-align:center;padding:48px;color:var(--muted)"><span class="spin" style="font-size:32px">⚙️</span><div style="margin-top:12px">Carregando...</div></div></div>
  <div class="aviso" id="avisoEl"></div>
</div>
<script>
const { ipcRenderer } = require('electron')
async function carregar() {
  const hist = await ipcRenderer.invoke('hist:ler')
  if (!hist.length) {
    document.getElementById('histBox').innerHTML = `<div style="text-align:center;padding:64px;color:var(--muted)"><div style="font-size:48px;margin-bottom:12px">📭</div><div style="font-size:14px">Nenhuma limpeza realizada ainda</div></div>`
    return
  }
  const totalGeral = hist.reduce((s,h)=>s+h.bytes,0)
  document.getElementById('histBox').innerHTML = `
    <div class="kpi-grid" style="margin-bottom:16px">
      <div class="kpi-card"><div><div class="kpi-label">Total de Limpezas</div><div class="kpi-value">${hist.length}</div></div><div class="kpi-icon" style="background:var(--red-bg)">🧹</div></div>
      <div class="kpi-card"><div><div class="kpi-label">Total Liberado</div><div class="kpi-value" style="font-size:18px;color:var(--green)">${fmtBytes(totalGeral)}</div></div><div class="kpi-icon" style="background:var(--green-bg)">💾</div></div>
    </div>
    ${hist.map(h=>`
      <div class="card" style="margin-bottom:10px">
        <div class="card-header">
          <span class="card-title">🧹 ${h.data}</span>
          <span style="font-size:14px;font-weight:800;color:var(--green)">${fmtBytes(h.bytes)} liberados</span>
        </div>
        <div class="card-body" style="padding:12px 16px">
          <div style="font-size:12px;color:var(--fg2);line-height:1.9">${(h.log||[]).join('<br>')}</div>
        </div>
      </div>`).join('')}`
}

async function limpar() {
  confirmar('Limpar todo o histórico?', async ok => {
    if (!ok) return
    await ipcRenderer.invoke('hist:limpar')
    aviso('ok', '✅ Histórico limpo.')
    carregar()
  })
}
carregar()
</script></body></html>
